<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <circle cx="256" cy="256" r="200" fill="none" stroke="#6c5ce7" stroke-width="44"/>
  <!-- Cosine wave: center → up → center → down → center -->
  <path d="M 90 256 C 145 165, 200 165, 256 256 C 312 347, 367 347, 422 256"
        fill="none" stroke="#6c5ce7" stroke-width="14" stroke-linecap="round"/>
  <!-- Sine wave (mirrored): center → down → center → up → center -->
  <path d="M 90 256 C 145 347, 200 347, 256 256 C 312 165, 367 165, 422 256"
        fill="none" stroke="#00cec9" stroke-width="14" stroke-linecap="round"/>
</svg>
