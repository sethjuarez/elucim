<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Elucim logo: bold "e" + sine wave spark — passes the baseball cap test -->
  <!-- A thick ring with a single sine curve cutting through it -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#6c5ce7" stroke-width="48"/>
  <!-- Sine wave through the center — the "illumination" / animation motif -->
  <path d="M 96 256 C 176 136, 336 376, 416 256"
        fill="none" stroke="#6c5ce7" stroke-width="48" stroke-linecap="round"/>
</svg>
