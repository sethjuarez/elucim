name: Publish to npm

on:
  push:
    tags:
      - 'v*'

# OIDC trusted publishing — no npm tokens needed
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Publish @elucim/core first (dsl depends on it)
      - name: Publish @elucim/core
        run: cd packages/core && npm publish

      # Resolve workspace:* to real version before publishing dsl
      - name: Publish @elucim/dsl
        run: |
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          cd packages/dsl
          node -e "
            const pkg = require('./package.json');
            pkg.dependencies['@elucim/core'] = '^' + process.argv[1];
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$CORE_VERSION"
          npm publish
