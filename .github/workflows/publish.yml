name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      core_release: ${{ steps.release.outputs['packages/core--release_created'] }}
      dsl_release: ${{ steps.release.outputs['packages/dsl--release_created'] }}
      editor_release: ${{ steps.release.outputs['packages/editor--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Publish @elucim/core
        if: ${{ needs.release-please.outputs.core_release == 'true' }}
        run: pnpm --filter @elucim/core publish --access public --no-git-checks --provenance

      - name: Publish @elucim/dsl
        if: ${{ needs.release-please.outputs.dsl_release == 'true' }}
        run: pnpm --filter @elucim/dsl publish --access public --no-git-checks --provenance

      - name: Publish @elucim/editor
        if: ${{ needs.release-please.outputs.editor_release == 'true' }}
        run: pnpm --filter @elucim/editor publish --access public --no-git-checks --provenance
